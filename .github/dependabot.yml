version: 2
updates:
    # Enable version updates for GitHub Actions
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
      cooldown:
          default-days: 7
      groups:
          github-actions-group:
              patterns:
                  - '*' # Groups all GitHub Actions updates
              update-types:
                  - 'minor'
                  - 'patch' # Only groups minor and patch updates
