name: Deploy to Production Environment

on:
    release:
        types: [released]

env:
    AWS_REGION: 'us-west-2'
    ECR_REPOSITORY: 'aidingapp'

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-22.04
        environment: production

        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
              with:
                  submodules: true
                  ref: ${{ github.head_ref }}
                  token: ${{ secrets.PAT }}

            - name: Login to Docker Hub
              uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 #4.0.0
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 #6.0.0
              with:
                  aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 #2.1.1

            - name: Build, tag, and push image to Amazon ECR
              id: build-image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.event.release.tag_name }}
              run: |
                  # Build a docker container and
                  # push it to ECR so that it can
                  # be deployed to ECS.
                  docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG --target deploy --platform linux/amd64 --build-arg USER_ID=9999 --build-arg GROUP_ID=9999 .
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                  echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

            - name: Fill in the new image ID in the Amazon ECS task definition
              id: task-def
              uses: aws-actions/amazon-ecs-render-task-definition@77954e213ba1f9f9cb016b86a1d4f6fcdea0d57e #1.8.4
              with:
                  task-definition: 'docker/devops/ecs/aidingapp/aidingapp-prod-task-definition.json'
                  container-name: 'app'
                  image: ${{ steps.build-image.outputs.image }}

            - name: Deploy Amazon ECS task definition
              uses: aws-actions/amazon-ecs-deploy-task-definition@fc8fc60f3a60ffd500fcb13b209c59d221ac8c8c #2.6.1
              with:
                  task-definition: ${{ steps.task-def.outputs.task-definition }}
                  service: 'aidingapp-prod-service'
                  cluster: 'aidingapp-prod'
                  wait-for-service-stability: true
